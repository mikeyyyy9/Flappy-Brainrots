<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Brainrots</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
}

canvas {
    display: block;
    margin: 0 auto;
}

.ui {
    position: absolute;
    color: white;
    font-size: 28px;
    text-shadow: 0 0 10px black;
}

#score {
    top: 20px;
    left: 20px;
}

#menu, #gameOver, #shop {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    color: white;
}

#menu { display: flex; }

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    margin: 10px;
    cursor: pointer;
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    color: black;
    font-weight: bold;
    border-radius: 10px;
}

button:hover {
    transform: scale(1.1);
}

#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(#050014, #000);
}

</style>
</head>

<body>

<div id="bg"></div>

<canvas id="game" width="500" height="700"></canvas>

<div id="score" class="ui">Score: 0</div>

<div id="menu">
    <h1>💀 Flappy Brainrots</h1>
    <button onclick="startGame()">Start</button>
    <button onclick="openShop()">Shop 🛒</button>
</div>

<div id="gameOver">
    <h1>Game Over</h1>
    <p id="final"></p>
    <p id="best"></p>
    <button onclick="startGame()">Retry</button>
    <button onclick="openShop()">Shop 🛒</button>
</div>

<div id="shop">
    <h1>Brainrot Shop</h1>
    <p id="coins"></p>
    <div id="list"></div>
    <button onclick="closeShop()">Close</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* =======================
   🧠 SKINS (FIXED)
======================= */
const skins = [
    { name: "Tungtung Sahur", img: "skins/tungtungsahur.png", unlock: 0 }
];

/* =======================
   💾 SAVE SYSTEM (FIXED DEFAULTS)
======================= */
let owned = JSON.parse(localStorage.getItem("owned")) || ["Tungtung Sahur"];
let equipped = localStorage.getItem("equipped") || "Tungtung Sahur";
let best = Number(localStorage.getItem("best")) || 0;

/* =======================
   GAME STATE
======================= */
let bird, pipes, score, coins;
let velocity, gravity;
let running = false;

/* =======================
   INIT
======================= */
function reset() {
    bird = {
        x: 100,
        y: 200,
        img: new Image()
    };

    setSkin(equipped);

    pipes = [];
    score = 0;
    coins = 0;
    gravity = 0.5;
    velocity = 0;
    running = true;

    document.getElementById("score").innerText = "Score: 0";
}

/* =======================
   SKIN EQUIP
======================= */
function setSkin(name) {
    const skin = skins.find(s => s.name === name);
    if (!skin) return;

    bird.img = new Image();
    bird.img.src = skin.img;

    equipped = name;
    localStorage.setItem("equipped", name);
}

/* =======================
   START GAME
======================= */
function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("shop").style.display = "none";
    reset();
    loop();
}

/* =======================
   INPUT
======================= */
document.addEventListener("click", () => {
    if (running) velocity = -8;
});

/* =======================
   PIPES
======================= */
function pipe() {
    let gap = 160;
    let top = Math.random() * 300 + 100;
    pipes.push({ x: canvas.width, top, gap, passed: false });
}

/* =======================
   UPDATE
======================= */
function update() {
    velocity += gravity;
    bird.y += velocity;

    if (pipes.length === 0 || pipes[pipes.length - 1].x < 250) pipe();

    pipes.forEach(p => {
        p.x -= 3;

        if (!p.passed && p.x < bird.x) {
            score++;
            coins++;
            p.passed = true;
            document.getElementById("score").innerText = "Score: " + score;
        }

        if (
            bird.x < p.x + 60 &&
            bird.x + 50 > p.x &&
            (bird.y < p.top || bird.y > p.top + p.gap)
        ) end();
    });

    pipes = pipes.filter(p => p.x > -100);

    if (bird.y > canvas.height || bird.y < 0) end();
}

/* =======================
   DRAW
======================= */
function draw() {
    ctx.fillStyle = "#050014";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffff";
    pipes.forEach(p => {
        ctx.fillRect(p.x, 0, 60, p.top);
        ctx.fillRect(p.x, p.top + p.gap, 60, canvas.height);
    });

    ctx.drawImage(bird.img, bird.x, bird.y, 50, 50);
}

/* =======================
   LOOP
======================= */
function loop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

/* =======================
   GAME OVER (FIXED BEST SAVE)
======================= */
function end() {
    running = false;

    if (score > best) {
        best = score;
        localStorage.setItem("best", best);
    }

    document.getElementById("final").innerText = "Score: " + score;
    document.getElementById("best").innerText = "Best: " + best;
    document.getElementById("gameOver").style.display = "flex";
}

/* =======================
   SHOP
======================= */
function openShop() {
    document.getElementById("shop").style.display = "flex";

    let list = document.getElementById("list");
    list.innerHTML = "";

    document.getElementById("coins").innerText = "Best Score: " + best;

    skins.forEach(s => {
        let btn = document.createElement("button");

        let unlocked = owned.includes(s.name);

        btn.innerText = unlocked
            ? "Equip " + s.name
            : "Locked (Need " + s.unlock + " score)";

        if (!unlocked) btn.disabled = true;

        btn.onclick = () => {
            setSkin(s.name);
        };

        list.appendChild(btn);
    });
}

function closeShop() {
    document.getElementById("shop").style.display = "none";
}
</script>

</body>
</html>
