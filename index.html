<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Test</title>
<style>
body {
    margin: 0;
    background: black;
}
canvas {
    display: block;
    margin: auto;
    background: #111;
}
</style>
</head>

<body>

<canvas id="c" width="400" height="600"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let bird = { x: 80, y: 200, v: 0 };
let pipes = [];
let gravity = 0.5;
let score = 0;
let running = true;

/* INPUT */
document.addEventListener("click", () => {
    bird.v = -8;
});

/* PIPE */
function spawn() {
    let gap = 140;
    let top = Math.random() * 300 + 80;
    pipes.push({ x: 400, top, gap, passed: false });
}

/* UPDATE */
function update() {
    bird.v += gravity;
    bird.y += bird.v;

    if (pipes.length === 0 || pipes[pipes.length - 1].x < 200) {
        spawn();
    }

    pipes.forEach(p => {
        p.x -= 2;

        if (!p.passed && p.x < bird.x) {
            score++;
            p.passed = true;
        }

        if (
            bird.x < p.x + 50 &&
            bird.x + 20 > p.x &&
            (bird.y < p.top || bird.y > p.top + p.gap)
        ) {
            running = false;
        }
    });

    pipes = pipes.filter(p => p.x > -100);

    if (bird.y > 600 || bird.y < 0) {
        running = false;
    }
}

/* DRAW */
function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,400,600);

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, 10, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "lime";
    pipes.forEach(p => {
        ctx.fillRect(p.x, 0, 50, p.top);
        ctx.fillRect(p.x, p.top + p.gap, 50, 600);
    });

    ctx.fillStyle = "white";
    ctx.fillText("Score: " + score, 10, 20);
}

/* LOOP */
function loop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
