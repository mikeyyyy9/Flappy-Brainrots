<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Brainrots</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

canvas {
    display: block;
    margin: 0 auto;
    background: linear-gradient(#12002b, #000);
}

#ui {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 24px;
}
</style>
</head>

<body>

<div id="ui">Score: 0</div>
<canvas id="game" width="500" height="700"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird, pipes, score;
let gravity, velocity;
let running = true;

/* RESET */
function reset() {
    bird = { x: 100, y: 200 };
    pipes = [];
    score = 0;
    gravity = 0.5;
    velocity = 0;
    running = true;

    document.getElementById("ui").innerText = "Score: 0";
}

/* INPUT */
document.addEventListener("click", () => {
    if (running) velocity = -8;
});

/* PIPE */
function spawnPipe() {
    const gap = 150;
    const top = Math.random() * 300 + 100;
    pipes.push({ x: 500, top, gap, passed: false });
}

/* UPDATE */
function update() {
    velocity += gravity;
    bird.y += velocity;

    if (pipes.length === 0 || pipes[pipes.length - 1].x < 250) {
        spawnPipe();
    }

    pipes.forEach(p => {
        p.x -= 3;

        if (!p.passed && p.x < bird.x) {
            score++;
            p.passed = true;
            document.getElementById("ui").innerText = "Score: " + score;
        }

        // collision
        if (
            bird.x < p.x + 60 &&
            bird.x + 20 > p.x &&
            (bird.y < p.top || bird.y > p.top + p.gap)
        ) {
            running = false;
        }
    });

    pipes = pipes.filter(p => p.x > -100);

    if (bird.y > 700 || bird.y < 0) {
        running = false;
    }
}

/* DRAW */
function draw() {
    ctx.fillStyle = "#12002b";
    ctx.fillRect(0, 0, 500, 700);

    // bird
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, 10, 0, Math.PI * 2);
    ctx.fill();

    // pipes
    ctx.fillStyle = "lime";
    pipes.forEach(p => {
        ctx.fillRect(p.x, 0, 60, p.top);
        ctx.fillRect(p.x, p.top + p.gap, 60, 700);
    });
}

/* LOOP */
function loop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

/* START */
reset();
loop();
</script>

</body>
</html>
