<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Brainrots</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
    color: white;
}

canvas {
    display: block;
    margin: 0 auto;
}

.ui {
    position: absolute;
    font-size: 26px;
    text-shadow: 0 0 10px black;
}

#score {
    top: 20px;
    left: 20px;
}

#menu, #gameOver, #shop {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

#menu { display: flex; }

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    color: black;
    font-weight: bold;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<canvas id="game" width="500" height="700"></canvas>

<div id="score" class="ui">Score: 0</div>

<div id="menu">
    <h1>💀 Flappy Brainrots</h1>
    <button onclick="startGame()">Start</button>
    <button onclick="openShop()">Shop 🛒</button>
</div>

<div id="gameOver">
    <h1>Game Over</h1>
    <p id="final"></p>
    <p id="best"></p>
    <button onclick="startGame()">Retry</button>
    <button onclick="openShop()">Shop 🛒</button>
</div>

<div id="shop">
    <h1>Brainrot Shop</h1>
    <p id="coins"></p>
    <div id="list"></div>
    <button onclick="closeShop()">Close</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* =======================
   🧠 SKINS (NO IMAGES)
======================= */
const skins = [
    { name: "Tungtung Sahur", unlock: 0, emoji: "🧠💀" },
    { name: "Skibidi Rot", unlock: 5, emoji: "🚽💀" },
    { name: "Rizz Lord", unlock: 10, emoji: "😎🔥" },
    { name: "Gigachad Brain", unlock: 20, emoji: "🗿⚡" }
];

/* =======================
   SAVE DATA
======================= */
let owned = JSON.parse(localStorage.getItem("owned")) || ["Tungtung Sahur"];
let equipped = localStorage.getItem("equipped") || "Tungtung Sahur";
let best = Number(localStorage.getItem("best")) || 0;

/* =======================
   GAME STATE
======================= */
let bird, pipes, score;
let velocity, gravity;
let running = false;

/* =======================
   RESET GAME
======================= */
function reset() {
    bird = { x: 100, y: 200 };

    pipes = [];
    score = 0;
    velocity = 0;
    gravity = 0.5;
    running = true;

    document.getElementById("score").innerText = "Score: 0";
}

/* =======================
   START
======================= */
function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("shop").style.display = "none";
    reset();
    loop();
}

/* =======================
   INPUT
======================= */
document.addEventListener("click", () => {
    if (running) velocity = -8;
});

/* =======================
   PIPE
======================= */
function spawnPipe() {
    let gap = 150;
    let top = Math.random() * 300 + 100;
    pipes.push({ x: canvas.width, top, gap, passed: false });
}

/* =======================
   UPDATE
======================= */
function update() {
    velocity += gravity;
    bird.y += velocity;

    if (pipes.length === 0 || pipes[pipes.length - 1].x < 250) {
        spawnPipe();
    }

    pipes.forEach(p => {
        p.x -= 3;

        if (!p.passed && p.x < bird.x) {
            score++;
            p.passed = true;
            document.getElementById("score").innerText = "Score: " + score;
        }

        if (
            bird.x < p.x + 60 &&
            bird.x + 40 > p.x &&
            (bird.y < p.top || bird.y > p.top + p.gap)
        ) {
            endGame();
        }
    });

    pipes = pipes.filter(p => p.x > -100);

    if (bird.y > canvas.height || bird.y < 0) {
        endGame();
    }
}

/* =======================
   DRAW SKIN
======================= */
function drawBird() {
    const skin = skins.find(s => s.name === equipped);

    ctx.font = "40px Arial";
    ctx.fillText(skin.emoji, bird.x, bird.y);
}

/* =======================
   DRAW GAME
======================= */
function draw() {
    ctx.fillStyle = "#050014";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffff";
    pipes.forEach(p => {
        ctx.fillRect(p.x, 0, 60, p.top);
        ctx.fillRect(p.x, p.top + p.gap, 60, canvas.height);
    });

    drawBird();
}

/* =======================
   LOOP
======================= */
function loop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

/* =======================
   GAME OVER + SAVE
======================= */
function endGame() {
    running = false;

    if (score > best) {
        best = score;
        localStorage.setItem("best", best);

        // unlock skins based on BEST score
        skins.forEach(s => {
            if (best >= s.unlock && !owned.includes(s.name)) {
                owned.push(s.name);
            }
        });

        localStorage.setItem("owned", JSON.stringify(owned));
    }

    document.getElementById("final").innerText = "Score: " + score;
    document.getElementById("best").innerText = "Best: " + best;

    document.getElementById("gameOver").style.display = "flex";
}

/* =======================
   SHOP
======================= */
function openShop() {
    document.getElementById("shop").style.display = "flex";

    let list = document.getElementById("list");
    list.innerHTML = "";

    document.getElementById("coins").innerText = "Best Score: " + best;

    skins.forEach(s => {
        let btn = document.createElement("button");

        let unlocked = owned.includes(s.name);

        btn.innerText = unlocked
            ? "Equip " + s.name
            : "Locked (Need " + s.unlock + ")";

        btn.onclick = () => {
            if (unlocked) {
                equipped = s.name;
                localStorage.setItem("equipped", equipped);
            }
        };

        list.appendChild(btn);
    });
}

function closeShop() {
    document.getElementById("shop").style.display = "none";
}
</script>

</body>
</html>
